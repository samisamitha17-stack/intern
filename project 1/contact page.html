<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Contact Us - Digital Library</title>
    <link rel="stylesheet" href="contact page-style.css">
</head>
<body>

    <div class="contact-container">

        <div class="contact-info">
            <h1>📚 Contact Us</h1>
            <p>We are here to help you with your Digital Library needs.</p>

            <div class="info-box">
                <h3>📍 Address</h3>
                <p>123 Library Street, ooty, Tamil Nadu</p>
            </div>

            <div class="info-box">
                <h3>📞 Phone</h3>
                <p>+91 9514545116</p>
            </div>

            <div class="info-box">
                <h3>✉ Email</h3>
                <p>sam library@gmail.com</p>
            </div>
        </div>

        <div class="contact-form">
            <h2>Send Message</h2>

            <form>
                <input type="text" placeholder="Your Name" required>

                <input type="email" placeholder="Your Email" required>

                <input type="text" placeholder="Subject" required>

                <textarea rows="5" placeholder="Your Message"></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>

    </div>
