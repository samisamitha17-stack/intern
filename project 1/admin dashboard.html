<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin dashboard-style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="dashboard">

        <div class="sidebar">
            <h2>📚 Library Admin</h2>

            <ul>
                <li><i class="fas fa-home"></i> Dashboard</li>
                <li><i class="fas fa-users"></i> Students</li>
                <li><i class="fas fa-book"></i> Books</li>
                <li><i class="fas fa-book-reader"></i> Issued Books</li>
                <li><i class="fas fa-undo"></i> Returned Books</li>
                <li><i class="fas fa-cog"></i> Settings</li>
            </ul>
        </div>

        <div class="main-content">

            <div class="header">
                <h1>Admin Dashboard</h1>
                <button class="logout">Logout</button>
            </div>

            <div class="cards">

                <div class="card">
                    <i class="fas fa-user-graduate"></i>
                    <h2>250</h2>
                    <p>Total Students</p>
                </div>

                <div class="card">
                    <i class="fas fa-book"></i>
                    <h2>1200</h2>
                    <p>Total Books</p>
                </div>

                <div class="card">
                    <i class="fas fa-book-reader"></i>
                    <h2>320</h2>
                    <p>Issued Books</p>
                </div>

                <div class="card">
                    <i class="fas fa-check-circle"></i>
                    <h2>280</h2>
                    <p>Returned Books</p>
                </div>

            </div>

            <div class="actions">
                <button class="add-btn">➕ Add Book</button>
                <button class="delete-btn">🗑 Delete Book</button>
            </div>

        </div>

    </div>

</body>
</html>
