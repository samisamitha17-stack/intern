<!DOCTYPE html>
<html>
<head>
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="amazon.css">
</head>
<body>

<header>
    <h1>Amazon</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
        <a href="#">Orders</a>
    </nav>
</header>

<section class="banner">
    <h2>Welcome to Amazon</h2>
    <p>Everything you need at one place.</p>
</section>

<div class="products">
    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Headphones</h3>
        <p>₹999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Watch</h3>
        <p>₹1999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Shoes</h3>
        <p>₹2499</p>
        <button>Buy Now</button>
    </div>
</div>

<footer>
    <p>© Amazon Clone</p>
</footer>

</body>
</html>
