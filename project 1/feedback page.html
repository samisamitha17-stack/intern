<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>
    <link rel="stylesheet" href="feedback page-style.css">
</head>
<body>

    <div class="feedback-container">
        <h1>📚 Library Feedback</h1>
        <p class="subtitle">We value your feedback. Help us improve our Digital Library.</p>

        <form>
            <div class="input-group">
                <label>Name</label>
                <input type="text" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="rating">
                <label>Rate Our Library</label>
                <div class="stars">
                    ★★★★★
                </div>
            </div>

            <div class="input-group">
                <label>Your Feedback</label>
                <textarea rows="5" placeholder="Write your feedback here..."></textarea>
            </div>

            <button type="submit">Submit Feedback</button>
        </form>
    </div>
<a href="FAQ page.html">
    <button>view FAQ</button>
</a>
</body>
</html>
