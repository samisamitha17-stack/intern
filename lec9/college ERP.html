<!DOCTYPE html>
<html>
<head>
    <title>College ERP Dashboard</title>
    <link rel="stylesheet" href="college ERP-style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>College ERP</h2>

        <h3>Menu</h3>

        <ul>
            <li>Dashboard</li>
            <li>Students</li>
            <li>Courses</li>
            <li>Reports</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="topbar">
            <p>Admin Dashboard</p>
        </div>

        <h1>Dashboard Overview</h1>

        <div class="cards">
            <div class="card">
                <h3>Total Students</h3>
                <h2>1200</h2>
            </div>

            <div class="card">
                <h3>Courses</h3>
                <h2>35</h2>
            </div>

            <div class="card">
                <h3>Faculty</h3>
                <h2>80</h2>
            </div>
        </div>

        <h2>Student Details</h2>

        <div class="students">

            <div class="student">
                <h3>ananya</h3>
                <p>BCA - 2nd Year</p>
                <p>Roll No: 101</p>
            </div>

            <div class="student">
                <h3>nagul</h3>
                <p>BCA - 3rd Year</p>
                <p>Roll No: 102</p>
            </div>

            <div class="student">
                <h3>Aishu</h3>
                <p>B.Com - 1st Year</p>
                <p>Roll No: 103</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
