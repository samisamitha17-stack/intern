<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Travel Booking Website</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">TravelGo</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Packages</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Booking</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<div class="bg-info text-white text-center p-5">
    <h1>Travel Booking Website</h1>
    <p>Book Your Dream Vacation</p>
    <button class="btn btn-warning">Explore Now</button>
</div>

<!-- Booking Form -->
<div class="container my-5">
    <h2 class="text-center mb-4">Book Your Trip</h2>

    <form class="row g-3">
        <div class="col-md-4">
            <input type="text" class="form-control" placeholder="Name">
        </div>

        <div class="col-md-4">
            <input type="email" class="form-control" placeholder="Email">
        </div>

        <div class="col-md-4">
            <input type="text" class="form-control" placeholder="Destination">
        </div>

        <div class="col-12 text-center">
            <button class="btn btn-primary">Book Now</button>
        </div>
    </form>
</div>

<!-- 15 Travel Cards -->
<div class="container">
    <h2 class="text-center mb-4">Popular Destinations</h2>

    <div class="row">

        <!-- Card 1 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="https://picsum.photos/300/200?1" class="card-img-top">
                <div class="card-body">
                    <h5>Paris</h5>
                    <button class="btn btn-success">Book</button>
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="https://picsum.photos/300/200?2" class="card-img-top">
                <div class="card-body">
                    <h5>London</h5>
                    <button class="btn btn-success">Book</button>
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="https://picsum.photos/300/200?3" class="card-img-top">
                <div class="card-body">
                    <h5>Dubai</h5>
                    <button class="btn btn-success">Book</button>
                </div>
            </div>
        </div>

        <!-- Cards 4-15 -->
        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?4" class="card-img-top"><div class="card-body"><h5>Singapore</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?5" class="card-img-top"><div class="card-body"><h5>Tokyo</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?6" class="card-img-top"><div class="card-body"><h5>Bali</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?7" class="card-img-top"><div class="card-body"><h5>Maldives</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?8" class="card-img-top"><div class="card-body"><h5>Goa</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?9" class="card-img-top"><div class="card-body"><h5>New York</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?10" class="card-img-top"><div class="card-body"><h5>Rome</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?11" class="card-img-top"><div class="card-body"><h5>Sydney</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?12" class="card-img-top"><div class="card-body"><h5>Bangkok</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?13" class="card-img-top"><div class="card-body"><h5>Kerala</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?14" class="card-img-top"><div class="card-body"><h5>Switzerland</h5><button class="btn btn-success">Book</button></div></div></div>

        <div class="col-md-4 mb-4"><div class="card"><img src="https://picsum.photos/300/200?15" class="card-img-top"><div class="card-body"><h5>Turkey</h5><button class="btn btn-success">Book</button></div></div></div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-4">
    <p>© 2026 TravelGo. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
